name: Frontend Build & Typecheck

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps (frontend)
        run: |
          if [ -f package-lock.json ] && grep -q '"lockfileVersion"' package-lock.json; then
            echo "Using npm ci with existing lockfile"
            npm ci
          else
            echo "No valid package-lock.json. Generating and installing..."
            npm install --package-lock-only
            npm install
          fi
          
      - name: Fix Rollup Linux module issue
        run: |
          echo "Fixing potential Rollup Linux module issue..."
          rm -rf node_modules/@rollup/rollup-linux-*
          npm install --force

      - name: Lint (if present)
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npx tsc --project tsconfig.typecheck.json
